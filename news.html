<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新闻动态 | 王明课题组</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav container">
        <a href="./index.html" class="brand">
          <span class="brand-badge">WM</span>
          <span>
            <strong data-i18n="brandCn">王明课题组</strong>
            <small data-i18n="brandEn">Wang Ming Laboratory</small>
          </span>
        </a>
        <div class="nav-right">
          <div class="lang-switch">
            <button class="lang-btn active" data-lang-btn="zh" type="button">中文</button>
            <button class="lang-btn" data-lang-btn="en" type="button">EN</button>
          </div>
        </div>
        <ul class="nav-links nav-links-static">
          <li><a href="./index.html">首页</a></li>
          <li><a href="./members.html" data-i18n="navMembers">成员介绍</a></li>
          <li><a href="./publications.html" data-i18n="navPapers">文章信息</a></li>
        </ul>
      </nav>
    </header>

    <main class="section container">
      <div class="section-head">
        <h2 data-i18n="newsListTitle">新闻列表</h2>
        <p data-i18n="newsListSub">点击新闻进入独立详情页</p>
      </div>
      <section class="filter-panel">
        <div class="search-box">
          <label class="search-label" data-i18n="searchTitle">站内检索</label>
          <input id="newsSearch" class="search-input" type="search" data-i18n-placeholder="searchPlaceholderNews" placeholder="搜索新闻标题、内容" />
        </div>
        <div>
          <p class="search-label" data-i18n="tagTitle">学术标签</p>
          <div id="newsTags" class="tag-row"></div>
        </div>
      </section>
      <div id="newsPageList" class="news-list"></div>
    </main>

    <script src="./site-data.js"></script>
    <script src="./news.js"></script>
  </body>
</html>
